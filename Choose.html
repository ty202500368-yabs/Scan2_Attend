<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account - Choose Role</title>
  <link rel="stylesheet" href="chooserole.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-image: url('background.jpg');
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .box {
      background: white;
      border-radius: 10px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .top-bar {
      background: #800000;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .school-logo {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid white;
      flex-shrink: 0;
    }

    .school-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .top-bar-text h1 {
      color: white;
      font-size: 19px;
    }

    .top-bar-text p {
      color: #ffcccc;
      font-size: 12px;
      margin-top: 2px;
    }

    .form-body {
      padding: 24px;
    }

    .form-body h2 {
      font-size: 14px;
      color: #800000;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .form-body > p {
      font-size: 12px;
      color: #999;
      margin-bottom: 20px;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .card {
      border: 2px solid #ddd;
      border-radius: 10px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .card:hover {
      border-color: #800000;
      background: #fff5f5;
    }

    .card-icon {
      width: 46px;
      height: 46px;
      background: #fff0f0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 22px;
    }

    .card-text h3 {
      font-size: 14px;
      color: #333;
      margin-bottom: 3px;
    }

    .card-text p {
      font-size: 11px;
      color: #999;
      margin: 0;
    }

    .card-arrow {
      margin-left: auto;
      color: #ccc;
      font-size: 20px;
      font-weight: bold;
    }

    .card:hover .card-arrow {
      color: #800000;
    }

    .login-link {
      text-align: center;
      font-size: 11px;
      color: #999;
    }

    .login-link a {
      color: #800000;
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="box">
  <div class="top-bar">
    <div class="school-logo">
      <img src="wmsu.jpg" alt="WMSU Logo">
    </div>
    <div class="top-bar-text">
      <h1>Scan2Attend</h1>
      <p>WMSU</p>
    </div>
  </div>

  <div class="form-body">
    <h2>Create Account</h2>
    <p>Select your role to get started with registration.</p>

    <div class="cards">

      <a href="CreateAccs.html" class="card">
        <div class="card-icon">&#127979;</div>
        <div class="card-text">
          <h3>Student</h3>
          <p>Register using your Student ID number</p>
        </div>
        <span class="card-arrow">&#8250;</span>
      </a>

      <a href="CreateAdmin.html" class="card">
        <div class="card-icon">&#128104;&#8205;&#127979;</div>
        <div class="card-text">
          <h3>Professor</h3>
          <p>Register using your Professor ID number</p>
        </div>
        <span class="card-arrow">&#8250;</span>
      </a>

    </div>

    <p class="login-link">Already have an account? <a href="#">Log in</a></p>
  </div>
</div>

</body>
</html>
