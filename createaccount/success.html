<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Created</title>
    <link rel="stylesheet" href="CreateAcc.css">
    <style>
        .success-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .success-box {
            background: white;
            padding: 50px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        .success-box h1 {
            color: #5A1321;
            font-size: 32px;
            margin-bottom: 20px;
        }
        .success-box p {
            color: #555;
            font-size: 18px;
            margin-bottom: 30px;
        }
        .success-box a {
            background-color: #5A1321;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        .success-box a:hover {
            background-color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-box">
            <h1>✓ Successfully Created Account!</h1>
            <p>Your account has been created successfully.</p>
            <a href="../login-page/LoginPage.html">Go to Login</a>
        </div>
    </div>
</body>
</html>
