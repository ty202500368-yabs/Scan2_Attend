<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-image: url('background.jpg');
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .box {
      background: white;
      border-radius: 10px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .top-bar {
      background: #800000;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .school-logo {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid white;
      flex-shrink: 0;
    }

    .school-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .top-bar-text h1 {
      color: white;
      font-size: 19px;
    }

    .top-bar-text p {
      color: #ffcccc;
      font-size: 12px;
      margin-top: 2px;
    }

    .form-body {
      padding: 20px 24px 22px;
    }

    .notice {
      background: #fff0f0;
      border-left: 4px solid #800000;
      padding: 10px 13px;
      border-radius: 5px;
      font-size: 12px;
      color: #800000;
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      color: #800000;
      margin-bottom: 4px;
    }

    input,
    select {
      width: 100%;
      padding: 9px 11px;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      color: #333;
      outline: none;
      margin-bottom: 13px;
      background: #fffafa;
    }

    input:focus,
    select:focus {
      border-color: #800000;
    }

    input::placeholder {
      color: #bbb;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 11px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 4px;
      width: 100%;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-clear {
      background: white;
      border: 1.5px solid #ddd;
      color: #888;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      flex: 1;
      padding: 10px;
      height: 38px;
      border-radius: 6px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-clear:hover {
      border-color: #800000;
      color: #800000;
    }

    .btn-submit {
      background: #800000;
      color: white;
      flex: 1;
      padding: 10px;
      height: 38px;
      border: none;
      border-radius: 6px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-submit:hover {
      background: #5c0000;
    }

    .login-link {
      text-align: center;
      font-size: 11px;
      color: #999;
      margin-top: 13px;
    }

    .login-link a {
      color: #800000;
      font-weight: bold;
      text-decoration: none;
    }

    /* Gender section */
    .gender-section {
      margin-bottom: 13px;
    }

    .gender-label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      color: #800000;
      margin-bottom: 8px;
    }

    .gender-options {
      display: flex;
      gap: 20px;
      margin-bottom: 13px;
    }

    .gender-options label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: normal;
      color: #333;
      cursor: pointer;
      margin-bottom: 0;
    }

    .gender-options input[type="radio"] {
      width: auto;
      margin-bottom: 0;
      accent-color: #800000;
      cursor: pointer;
    }

    /* Cancel link styled as button */
    .btn-cancel {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      background: white;
      border: 1.5px solid #ddd;
      color: #888;
    }

    .btn-cancel:hover {
      border-color: #800000;
      color: #800000;
    }
  </style>
</head>
<body>

<div class="box">
  <div class="top-bar">
    <div class="school-logo">
      <img src="wmsu2.jpg" alt="WMSU Logo">
    </div>
    <div class="top-bar-text">
      <h1>Create Account</h1>
      <p>WMSU students only</p>
    </div>
  </div>

  <div class="form-body">
    <div class="notice">
      Please use your <strong>WMSU Email</strong> to register.
    </div>

    <form action="success.html" method="GET">

      <div class="row">
        <div>
          <label>Last Name</label>
          <input type="text" name="lastname" placeholder="Dela Cruz" required />
        </div>
        <div>
          <label>First Name</label>
          <input type="text" name="firstname" placeholder="Juan" required />
        </div>
      </div>

      <div class="row">
        <div>
          <label>Middle Name</label>
          <input type="text" name="middlename" placeholder="Santos" />
        </div>
        <div>
          <label>Student ID</label>
          <input type="text" name="studentid" placeholder="WMSU-2024-0001" required />
        </div>
      </div>

      <label>Course / Section</label>
      <input list="course" name="section" placeholder="Enter Your Section (CS/IT/ACT)" required />
      <datalist id="course">
        <option value="BSCS 1-A">
        <option value="BSCS 1-B">
        <option value="BSIT 1-A">
        <option value="BSIT 1-B">
        <option value="BSCS 2-A">
        <option value="BSCS 2-B">
        <option value="BSIT 2-A">
        <option value="BSIT 2-B">
        <option value="BSCS 3-A">
        <option value="BSCS 3-B">
        <option value="BSIT 3-A">
        <option value="BSIT 3-B">
        <option value="BSCS 4-A">
        <option value="BSCS 4-B">
        <option value="BSIT 4-A">
        <option value="BSIT 4-B">
        <option value="ACT AD 1-A">
        <option value="ACT AD 1-B">
        <option value="ACT NT 2-A">
        <option value="ACT NT 2-B">
      </datalist>

      <label>Username</label>
      <input type="text" name="username" placeholder="Enter Your Username" required />

      <label>WMSU Email</label>
      <input type="email" name="email" placeholder="name@wmsu.edu.ph" required />

      <label>Password</label>
      <input type="password" name="password" placeholder="Enter Your Password" required />

      <label>Confirm Password</label>
      <input type="password" name="confirm" placeholder="Confirm Your Password" required />

      <div class="gender-section">
        <span class="gender-label">Gender</span>
        <div class="gender-options">
          <label>
            <input type="radio" name="gender" value="male" required />
            Male
          </label>
          <label>
            <input type="radio" name="gender" value="female" />
            Female
          </label>
        </div>
      </div>

      <div class="buttons">
        <a href="Choose.html" class="btn-clear">Cancel</a>
        <input type="submit" value="Create Account" class="btn-submit" />
      </div>

      <p class="login-link">Already have an account? <a href="../login-page/LoginPage.html">Log in</a></p>

    </form>
  </div>
</div>

</body>
</html>
